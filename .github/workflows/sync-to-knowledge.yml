name: Sync Published Notes to Knowledge Vault

on:
  push:
    branches: [main]
    paths: ['src/site/notes/00_publish/**']
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Library
        uses: actions/checkout@v4

      - name: Checkout Knowledge
        uses: actions/checkout@v4
        with:
          repository: WhiteHades/knowledge
          token: ${{ secrets.KNOWLEDGE_PAT }}
          path: knowledge

      - name: Sync Notes
        run: |
          CHANGED_FILES=$(rsync -acni --delete --out-format='%i %n%L' src/site/notes/00_publish/ knowledge/00_publish/ | grep -E '^(>f|\*deleting|c)' || true)
          if [ -z "$CHANGED_FILES" ]; then
            echo "Library and Knowledge notes are already in sync"
            exit 0
          fi

          printf '%s\n' "$CHANGED_FILES"
          rsync -av --delete src/site/notes/00_publish/ knowledge/00_publish/
          cd knowledge
          git config user.name "Library Bot"
          git config user.email "bot@library.mohammedefaz.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "sync: ingest published notes from library"
            git push
          fi
