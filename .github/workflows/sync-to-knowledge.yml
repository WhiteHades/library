name: Sync Published Notes to Knowledge Vault

on:
  push:
    branches: [main]
    paths:
      - 'src/site/notes/00_publish/**'
      - 'src/site/_data/publish/**'
      - 'src/site/img/channels/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Library
        uses: actions/checkout@v4

      - name: Checkout Knowledge
        uses: actions/checkout@v4
        with:
          repository: WhiteHades/knowledge
          token: ${{ secrets.KNOWLEDGE_PAT }}
          path: knowledge

      - name: Sync Notes
        run: |
          mkdir -p knowledge/00_publish
          mkdir -p knowledge/99_meta/publish-data
          mkdir -p knowledge/99_meta/publish-data/channel-assets

          NOTE_CHANGES=$(rsync -acni --delete --out-format='%i %n%L' src/site/notes/00_publish/ knowledge/00_publish/ | grep -E '^(>f|\*deleting|c)' || true)
          DATA_CHANGES=$(rsync -acni --delete --out-format='%i %n%L' src/site/_data/publish/ knowledge/99_meta/publish-data/ | grep -E '^(>f|\*deleting|c)' || true)
          CHANNEL_ASSET_CHANGES=$(rsync -acni --delete --out-format='%i %n%L' src/site/img/channels/ knowledge/99_meta/publish-data/channel-assets/ | grep -E '^(>f|\*deleting|c)' || true)

          if [ -z "$NOTE_CHANGES" ] && [ -z "$DATA_CHANGES" ] && [ -z "$CHANNEL_ASSET_CHANGES" ]; then
            echo "Library and Knowledge publish files are already in sync"
            exit 0
          fi

          if [ -n "$NOTE_CHANGES" ]; then
            echo "Note changes:"
            printf '%s\n' "$NOTE_CHANGES"
            rsync -av --delete src/site/notes/00_publish/ knowledge/00_publish/
          fi

          if [ -n "$DATA_CHANGES" ]; then
            echo "Publish data changes:"
            printf '%s\n' "$DATA_CHANGES"
            rsync -av --delete src/site/_data/publish/ knowledge/99_meta/publish-data/
          fi

          if [ -n "$CHANNEL_ASSET_CHANGES" ]; then
            echo "Channel asset changes:"
            printf '%s\n' "$CHANNEL_ASSET_CHANGES"
            rsync -av --delete src/site/img/channels/ knowledge/99_meta/publish-data/channel-assets/
          fi

          cd knowledge
          git config user.name "Library Bot"
          git config user.email "bot@library.mohammedefaz.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "sync: ingest published notes from library"
            git push
          fi
