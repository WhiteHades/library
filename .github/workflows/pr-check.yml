name: PR Validation Bot

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm install

      - name: Run tests
        run: npm test

      - name: Run build (excluding PDF generation)
        run: |
          npm run get-theme
          npm run build:eleventy
          npm run build:sass

      - name: Validate frontmatter and structure
        run: node scripts/validate-pr.js

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botPrefix = "## PR Validation Bot";
            const existing = comments.find((c) => c.body && c.body.startsWith(botPrefix));

            const steps = [
              { name: "Tests", result: ${{ job.steps['Run tests'].outcome === 'success' }} },
              { name: "Build", result: ${{ job.steps['Run build (excluding PDF generation)'].outcome === 'success' }} },
              { name: "Structure validation", result: ${{ job.steps['Validate frontmatter and structure'].outcome === 'success' }} },
            ];

            const allPass = steps.every((s) => s.result);
            const statusLine = allPass
              ? "All checks passed. This PR is ready for review and merge."
              : "Some checks failed. Please review the errors below and push fixes.";

            const body = `${botPrefix}\n\n${statusLine}\n\n| Check | Result |\n|-------|--------|\n` +
              steps.map((s) => `| ${s.name} | ${s.result ? "Pass" : "Fail"} |`).join("\n");

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
