name: Propose a New Idea

description: Submit a new thematic idea folder

labels: ["content", "needs-review"]

body:
  - type: input
    id: key
    attributes:
      label: Idea Key
      placeholder: "e.g., philosophy"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Title
      placeholder: "e.g., Philosophy"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is this idea about?
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Proposed Notes
      description: List the notes you plan to include
    validations:
      required: true
